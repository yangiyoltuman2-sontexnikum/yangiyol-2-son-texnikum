/* ================== 25 TA TASODIFIY SAVOL ================== */
function shuffleArray(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

let selectedQuestions = shuffleArray([...questions]).slice(0, 25);

/* ================== O'ZGARUVCHILAR ================== */
let currentQuestion = 0;
let score = 0;
let time = 20 * 60;
let timerInterval;
let username = "";

/* ================== FUNKSIYALAR ================== */
function startTest() {
  

  
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("testScreen").classList.remove("hidden");
  startTimer();
  loadQuestion();
}

function startTimer() {
  timerInterval = setInterval(() => {
    time--;
    const m = Math.floor(time / 60);
    const s = time % 60;
    document.getElementById("timer").textContent = `${m}:${s < 10 ? "0" : ""}${s}`;
    if (time <= 0) finishTest();
  }, 1000);
}

function loadQuestion() {
  const q = selectedQuestions[currentQuestion];
  document.getElementById("question").textContent = q.q;
  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";
  q.options.forEach((opt, i) => {
    optDiv.innerHTML += `
      <div class="option">
        <input type="radio" name="option" value="${i}"> ${opt}
      </div>`;
  });
}

function nextQuestion() {
  const selected = document.querySelector('input[name="option"]:checked');
  if (selected && parseInt(selected.value) === selectedQuestions[currentQuestion].answer) {
    score++;
  }
  currentQuestion++;
  if (currentQuestion < selectedQuestions.length) loadQuestion();
  else finishTest();
}

function finishTest() {
  clearInterval(timerInterval);
  document.getElementById("testScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  document.getElementById("resultText").textContent =
    `siz ${selectedQuestions.length} ta savoldan ${score} tasiga to‘g‘ri javob berdingiz.`;
}
</script>
